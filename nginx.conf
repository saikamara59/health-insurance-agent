server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /clients {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /compare {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /calculate {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /translate {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /appeal {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /verify {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /estimate {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /plans/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /history {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /feedback {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /api-keys {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

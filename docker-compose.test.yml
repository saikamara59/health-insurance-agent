services:
  backend:
    environment:
      - ANTHROPIC_API_KEY=test-key-not-used
      - JWT_SECRET=test-secret
      # All-zeros 32-byte test key (base64). Real prod uses a random key in secrets manager.
      - PHI_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      - EMAIL_PROVIDER=console
      - FRONTEND_BASE_URL=https://test.example.com
      - DATABASE_URL=sqlite+aiosqlite:////data/healthflow_test.db
      - HEALTHFLOW_TEST_MODE=1
    volumes:
      - test-db:/data

  seed:
    build:
      context: .
      target: backend
    environment:
      - ANTHROPIC_API_KEY=test-key-not-used
      - JWT_SECRET=test-secret
      # All-zeros 32-byte test key (base64). Real prod uses a random key in secrets manager.
      - PHI_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      - EMAIL_PROVIDER=console
      - FRONTEND_BASE_URL=https://test.example.com
      - DATABASE_URL=sqlite+aiosqlite:////data/healthflow_test.db
      - HEALTHFLOW_TEST_MODE=1
      - PYTHONPATH=/app
    volumes:
      - test-db:/data
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "scripts/seed_test_db.py"]
    restart: "no"

volumes:
  test-db:
